<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TKE Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0a0f;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #16161f;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #ff7a18;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 14px;
    color: #ccc;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #2a2a3a;
    background: #0a0a0f;
    color: #fff;
    font-size: 16px;
  }
  input:focus { outline: none; border-color: #ff7a18; }
  .password-wrap { position: relative; }
  .password-wrap input { padding-left: 42px; }
  .eye-btn {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: auto;
    padding: 0;
    background: none;
    border: none;
    color: #888;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    margin-top: 0;
  }
  .eye-btn:hover { color: #ff7a18; }
  button {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: #ff7a18;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    cursor: pointer;
  }
  button:active { background: #e06a10; }
  button:disabled { background: #555; cursor: not-allowed; }
  .error {
    background: #3a1414;
    color: #ff8888;
    border: 1px solid #5a2222;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .welcome { text-align: center; }
  .welcome h2 { margin-bottom: 8px; }
  .welcome p { color: #888; font-size: 14px; margin-bottom: 24px; }
  .logout-btn {
    background: transparent;
    border: 1px solid #2a2a3a;
    color: #ccc;
    margin-top: 12px;
  }
  .secondary-btn {
    background: transparent;
    border: 1px solid #2a2a3a;
    color: #ccc;
  }
  .fingerprint-icon {
    font-size: 56px;
    text-align: center;
    margin-bottom: 8px;
  }
  .center-text { text-align: center; }
</style>
</head>
<body>

<div class="card">

  <!-- מסך התחברות -->
  <div id="screen-login" class="screen active">
    <div class="logo">TKE Manager</div>
    <div class="subtitle">פיקוח אפליקציית שטח</div>
    <label for="login-username">שם משתמש</label>
    <input type="text" id="login-username" autocomplete="username">

    <label for="login-password">סיסמה</label>
    <div class="password-wrap">
      <input type="password" id="login-password" autocomplete="current-password">
      <button type="button" class="eye-btn" onclick="togglePassword('login-password', this)" tabindex="-1">👁</button>
    </div>

    <div class="error" id="login-error"></div>

    <button id="login-btn" onclick="doLogin()">התחבר</button>
  </div>

  <!-- מסך שינוי סיסמה (כניסה ראשונה) -->
  <div id="screen-change-password" class="screen">
    <div class="logo">TKE Manager</div>
    <div class="subtitle">זו כניסה ראשונה — בחר סיסמה קבועה</div>

    <label for="new-password">סיסמה חדשה (8 תווים לפחות)</label>
    <div class="password-wrap">
      <input type="password" id="new-password">
      <button type="button" class="eye-btn" onclick="togglePassword('new-password', this)" tabindex="-1">👁</button>
    </div>

    <label for="confirm-password">אימות סיסמה</label>
    <div class="password-wrap">
      <input type="password" id="confirm-password">
      <button type="button" class="eye-btn" onclick="togglePassword('confirm-password', this)" tabindex="-1">👁</button>
    </div>

    <div class="error" id="change-error"></div>

    <button id="change-btn" onclick="doChangePassword()">שמור סיסמה</button>
  </div>

  <!-- מסך הצעה להפעלת ביומטריה -->
  <div id="screen-enable-biometric" class="screen">
    <div class="fingerprint-icon">👆</div>
    <div class="logo center-text">כניסה בטביעת אצבע</div>
    <div class="subtitle">להפעיל כניסה מהירה עם טביעת אצבע / זיהוי פנים בפעמים הבאות?</div>
    <button onclick="enableBiometric()">כן, הפעל</button>
    <button class="secondary-btn" onclick="declineBiometric()">לא תודה</button>
  </div>

  <!-- מסך נעילה ביומטרית (בפתיחת האפליקציה) -->
  <div id="screen-biometric-lock" class="screen">
    <div class="fingerprint-icon">🔒</div>
    <div class="logo center-text">TKE Manager</div>
    <div class="subtitle" id="lock-user-name"></div>
    <div class="error" id="biometric-error"></div>
    <button onclick="unlockWithBiometric()">אמת עם טביעת אצבע</button>
    <button class="secondary-btn" onclick="fallbackToPasswordLogin()">התחבר עם סיסמה</button>
  </div>

  <!-- מסך דשבורד (שלד ראשוני) -->
  <div id="screen-dashboard" class="screen">
    <div class="welcome">
      <h2 id="welcome-name"></h2>
      <p id="welcome-region"></p>
      <p style="color:#555;">כאן יבנה הדשבורד המלא בהמשך</p>
      <button class="logout-btn" onclick="doLogout()">התנתק</button>
    </div>
  </div>

</div>

<script>
const API_BASE = 'https://tke-proxy.guyshtaiger.workers.dev';
let pendingToken = null;
let pendingUser = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError(elId) {
  document.getElementById(elId).style.display = 'none';
}

// ── WebAuthn helpers ──────────────────────────────────────

function bufToBase64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function base64urlToBuf(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  const bin = atob(str);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

async function isBiometricAvailable() {
  if (!window.PublicKeyCredential || !PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
    return false;
  }
  try {
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch {
    return false;
  }
}

async function enableBiometric() {
  try {
    const publicKey = {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: 'TKE Manager', id: location.hostname },
      user: {
        id: crypto.getRandomValues(new Uint8Array(16)),
        name: pendingUser.username,
        displayName: pendingUser.full_name || pendingUser.username,
      },
      pubKeyCredParams: [
        { type: 'public-key', alg: -7 },
        { type: 'public-key', alg: -257 },
      ],
      authenticatorSelection: {
        authenticatorAttachment: 'platform',
        userVerification: 'required',
        residentKey: 'preferred',
      },
      timeout: 60000,
      attestation: 'none',
    };

    const cred = await navigator.credentials.create({ publicKey });
    localStorage.setItem('tke_manager_credential_id', bufToBase64url(cred.rawId));
    finishLogin(pendingToken, pendingUser);
  } catch (err) {
    // אם המשתמש ביטל או שיש שגיאה — פשוט ממשיכים בלי ביומטריה
    finishLogin(pendingToken, pendingUser);
  }
}

function declineBiometric() {
  localStorage.setItem('tke_manager_biometric_declined', '1');
  finishLogin(pendingToken, pendingUser);
}

async function unlockWithBiometric() {
  hideError('biometric-error');
  const credId = localStorage.getItem('tke_manager_credential_id');
  if (!credId) { fallbackToPasswordLogin(); return; }

  try {
    const publicKey = {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ id: base64urlToBuf(credId), type: 'public-key' }],
      userVerification: 'required',
      timeout: 60000,
    };
    await navigator.credentials.get({ publicKey });
    // הצליח — מאמתים מול השרת שהטוקן השמור עדיין תקף
    await doLoginWithToken();
  } catch (err) {
    showError('biometric-error', 'האימות נכשל או בוטל, נסה שוב');
  }
}

function fallbackToPasswordLogin() {
  localStorage.removeItem('tke_manager_token');
  localStorage.removeItem('tke_manager_user');
  showScreen('screen-login');
}

// ── Auth flow ──────────────────────────────────────────────

function togglePassword(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  hideError('login-error');

  if (!username || !password) {
    showError('login-error', 'נא למלא שם משתמש וסיסמה');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'מתחבר...';

  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError('login-error', data.error === 'invalid credentials' ? 'שם משתמש או סיסמה שגויים' : data.error);
      return;
    }

    if (data.must_change_password) {
      pendingToken = data.token;
      pendingUser = data.user;
      showScreen('screen-change-password');
    } else {
      pendingToken = data.token;
      pendingUser = data.user;
      await maybeOfferBiometric();
    }
  } catch (err) {
    showError('login-error', 'שגיאת תקשורת, נסה שוב');
  } finally {
    btn.disabled = false;
    btn.textContent = 'התחבר';
  }
}

async function doChangePassword() {
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  hideError('change-error');

  if (newPass.length < 8) {
    showError('change-error', 'הסיסמה חייבת להיות לפחות 8 תווים');
    return;
  }
  if (newPass !== confirmPass) {
    showError('change-error', 'הסיסמאות אינן תואמות');
    return;
  }

  const btn = document.getElementById('change-btn');
  btn.disabled = true;
  btn.textContent = 'שומר...';

  try {
    const res = await fetch(`${API_BASE}/auth/change-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: pendingToken, new_password: newPass }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError('change-error', data.error);
      return;
    }

    await maybeOfferBiometric();
  } catch (err) {
    showError('change-error', 'שגיאת תקשורת, נסה שוב');
  } finally {
    btn.disabled = false;
    btn.textContent = 'שמור סיסמה';
  }
}

async function maybeOfferBiometric() {
  const already = localStorage.getItem('tke_manager_credential_id');
  const declined = localStorage.getItem('tke_manager_biometric_declined');
  const available = await isBiometricAvailable();

  if (!already && !declined && available) {
    showScreen('screen-enable-biometric');
  } else {
    finishLogin(pendingToken, pendingUser);
  }
}

function finishLogin(token, user) {
  localStorage.setItem('tke_manager_token', token);
  localStorage.setItem('tke_manager_user', JSON.stringify(user));
  showDashboard(user);
}

async function doLoginWithToken() {
  const token = localStorage.getItem('tke_manager_token');
  if (!token) { showScreen('screen-login'); return; }

  try {
    const res = await fetch(`${API_BASE}/auth/verify`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    const data = await res.json();

    if (data.valid) {
      localStorage.setItem('tke_manager_user', JSON.stringify(data.user));
      showDashboard(data.user);
    } else {
      localStorage.removeItem('tke_manager_token');
      localStorage.removeItem('tke_manager_credential_id');
      showScreen('screen-login');
    }
  } catch (err) {
    showScreen('screen-biometric-lock');
  }
}

function showDashboard(user) {
  document.getElementById('welcome-name').textContent = `ברוך הבא, ${user.full_name || user.username}`;
  document.getElementById('welcome-region').textContent = user.region ? `אזור: ${user.region}` : '';
  showScreen('screen-dashboard');
}

function doLogout() {
  localStorage.removeItem('tke_manager_token');
  localStorage.removeItem('tke_manager_user');
  localStorage.removeItem('tke_manager_credential_id');
  localStorage.removeItem('tke_manager_biometric_declined');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  showScreen('screen-login');
}

// ── טעינת הדף ──────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('tke_manager_token');
  const credId = localStorage.getItem('tke_manager_credential_id');
  const savedUser = localStorage.getItem('tke_manager_user');

  if (token && credId) {
    // יש טוקן וגם ביומטריה מופעלת — מציגים מסך נעילה
    if (savedUser) {
      try {
        const u = JSON.parse(savedUser);
        document.getElementById('lock-user-name').textContent = u.full_name || u.username;
      } catch {}
    }
    showScreen('screen-biometric-lock');
  } else if (token) {
    // יש טוקן בלי ביומטריה — נכנסים ישר (כמו קודם)
    doLoginWithToken();
  } else {
    showScreen('screen-login');
  }
});
</script>

</body>
</html>
